<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MT - 接続テスト</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1e9bff 0%, #8b3dff 50%, #ff5ca8 100%);
      color: #fff; text-align: center; padding: 24px; box-sizing: border-box;
    }
    .logo {
      font-size: 72px; font-weight: 800; letter-spacing: 2px;
      text-shadow: 0 4px 16px rgba(0,0,0,.35); margin-bottom: 8px;
    }
    .msg { font-size: 18px; opacity: .95; }
    .ok { margin-top: 20px; font-size: 15px; background: rgba(255,255,255,.2);
          padding: 10px 18px; border-radius: 999px; }
  </style>
</head>
<body>
  <div class="logo">MT</div>
  <div class="msg">My Trello（アプリ版）</div>
  <div class="ok">✅ サイトの公開に成功しました</div>
</body>
</html>
