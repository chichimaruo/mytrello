name: Build and Deploy PWA

# main に何かを上げる（commit）たびに自動で走る。手動実行もできる。
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: ソースを取得
        uses: actions/checkout@v4

      - name: Python を用意
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 画像処理ライブラリを入れる
        run: pip install Pillow

      - name: ビルド（style.css / app.js / アイコンを生成）
        run: python _build_pwa.py

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: 公開する中身（webapp フォルダ）をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp

      - name: GitHub Pages へ公開
        id: deployment
        uses: actions/deploy-pages@v4
