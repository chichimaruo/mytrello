name: Build and Deploy PWA

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: pages
    cancel-in-progress: true

  jobs:
    build-deploy:
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:
        - name: source
          uses: actions/checkout@v4
        - name: python
          uses: actions/setup-python@v5
          with:
            python-version: '3.x'
        - name: pillow
          run: pip install Pillow
        - name: build
          run: python _build_pwa.py
        - name: configure
          uses: actions/configure-pages@v5
        - name: upload
          uses: actions/upload-pages-artifact@v3
          with:
            path: webapp
        - name: deploy
          id: deployment
          uses: actions/deploy-pages@v4
